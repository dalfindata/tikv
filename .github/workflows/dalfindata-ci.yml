name: Dalfin CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tikv-toolchain:
    name: tikv-toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-01-30
          components: rustfmt, clippy, rust-src, rust-analyzer

      - name: Install native dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake protobuf-compiler clang libclang-dev pkg-config libssl-dev

      - name: Validate toolchain and workspace metadata
        run: |
          set -euo pipefail
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            go version
            rustc --version
            cargo --version
            cmake --version
            protoc --version
            clang --version | head -n 1
          } > tikv-toolchain-environment.txt
          cargo metadata --locked --format-version 1 > tikv-metadata.json

      - name: Upload toolchain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikv-toolchain-${{ github.sha }}
          if-no-files-found: warn
          path: |
            tikv-toolchain-environment.txt
            tikv-metadata.json

  tikv-check:
    name: tikv-check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-01-30
          components: rustfmt, clippy, rust-src, rust-analyzer

      - name: Install native dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake protobuf-compiler clang libclang-dev pkg-config libssl-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo check selected crates
        run: |
          set -euo pipefail
          cargo check --locked \
            -p tikv_alloc \
            -p collections \
            -p codec \
            -p error_code \
            -p tidb_query_codegen 2>&1 | tee tikv-check.log

      - name: Upload check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikv-check-${{ github.sha }}
          if-no-files-found: warn
          path: |
            tikv-check.log

  tikv-fmt:
    name: tikv-fmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-01-30
          components: rustfmt

      - name: Check formatting
        run: |
          set -euo pipefail
          cargo fmt --all --check 2>&1 | tee tikv-fmt.log

      - name: Upload format artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikv-fmt-${{ github.sha }}
          if-no-files-found: warn
          path: |
            tikv-fmt.log

  tikv-self-hosted-build:
    name: tikv-self-hosted-build
    if: vars.DALFINDATA_ENABLE_SELF_HOSTED == 'true'
    runs-on:
      - self-hosted
      - dalfindata
      - macos
      - apple-silicon
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-01-30
          components: rustfmt, clippy, rust-src, rust-analyzer

      - name: Capture environment metadata
        run: |
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            go version
            rustc --version
            cargo --version
            cmake --version
            protoc --version
            clang --version | head -n 1
          } > tikv-self-hosted-environment.txt

      - name: Build TiKV
        run: |
          set -euo pipefail
          make build 2>&1 | tee tikv-self-hosted-build.log

      - name: Upload self-hosted artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikv-self-hosted-build-${{ github.sha }}
          if-no-files-found: warn
          path: |
            tikv-self-hosted-environment.txt
            tikv-self-hosted-build.log
